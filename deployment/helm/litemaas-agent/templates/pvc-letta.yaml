{{- if and .Values.letta.persistence.enabled (not .Values.letta.externalPostgres.enabled) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "litemaas-agent.fullname" . }}-letta-data
  labels:
    {{- include "litemaas-agent.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.letta.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.letta.persistence.size }}
  {{- if .Values.letta.persistence.storageClass }}
  storageClassName: {{ .Values.letta.persistence.storageClass }}
  {{- end }}
{{- end }}
