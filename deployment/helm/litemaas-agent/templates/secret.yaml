{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litemaas-agent.fullname" . }}-secrets
  labels:
    {{- include "litemaas-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  LITELLM_API_KEY: {{ .Values.secrets.litellmApiKey | quote }}
  LITELLM_USER_API_KEY: {{ .Values.secrets.litellmUserApiKey | quote }}
  LITEMAAS_ADMIN_API_KEY: {{ .Values.secrets.litemaasAdminApiKey | quote }}
  AGENT_LLM_API_KEY: {{ .Values.secrets.agentLlmApiKey | quote }}
  GUARDRAILS_LLM_API_KEY: {{ .Values.secrets.guardrailsLlmApiKey | quote }}
  TOPIC_LLM_API_KEY: {{ .Values.secrets.topicLlmApiKey | quote }}
  {{- if .Values.letta.externalPostgres.enabled }}
  LETTA_PG_URI: {{ .Values.letta.externalPostgres.uri | quote }}
  {{- end }}
{{- end }}
