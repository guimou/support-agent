apiVersion: apps/v1
kind: Deployment
metadata:
  name: litemaas-agent-letta
  labels:
    app.kubernetes.io/component: letta
spec:
  # Single replica required — embedded PostgreSQL uses RWO storage.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: litemaas-agent
      app.kubernetes.io/component: letta
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litemaas-agent
        app.kubernetes.io/component: letta
    spec:
      containers:
        - name: letta
          image: letta/letta:latest
          ports:
            - name: http
              containerPort: 8283
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8283
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8283
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: letta-data
              mountPath: /data
      volumes:
        - name: letta-data
          persistentVolumeClaim:
            claimName: litemaas-agent-letta-data
