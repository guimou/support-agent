apiVersion: apps/v1
kind: Deployment
metadata:
  name: litemaas-agent-proxy
  labels:
    app.kubernetes.io/component: proxy
spec:
  # MUST be 1 — credential isolation depends on a single asyncio.Lock event loop.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: litemaas-agent
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litemaas-agent
        app.kubernetes.io/component: proxy
    spec:
      initContainers:
        - name: wait-for-letta
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://litemaas-agent-letta:8283/v1/health; do
                echo "Waiting for Letta..."; sleep 2
              done
      containers:
        - name: proxy
          image: quay.io/litemaas/agent-proxy:latest
          ports:
            - name: http
              containerPort: 8400
              protocol: TCP
          envFrom:
            - configMapRef:
                name: litemaas-agent-config
            - secretRef:
                name: litemaas-agent-secrets
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8400
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8400
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
