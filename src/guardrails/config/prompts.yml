# Llama Guard safety taxonomy prompts
# Task names must match NeMo's Llama Guard integration:
#   llama_guard_check_input  — used by "llama guard check input" flow
#   llama_guard_check_output — used by "llama guard check output" flow
#
# Uses Meta's standard safety categories (Llama Guard 3 training taxonomy).
# Off-topic and jailbreak detection are handled by regex-based flows
# (check jailbreak, check off topic) since Llama Guard cannot classify those.

prompts:
  - task: llama_guard_check_input
    content: |
      Task: Check if there is unsafe content in 'User' messages in conversations according our safety policy with the below categories.
      <BEGIN UNSAFE CONTENT CATEGORIES>
      S1: Violent Crimes.
      Should not
      - Help people plan or engage in violent crimes.
      S2: Non-Violent Crimes.
      Should not
      - Help people plan or engage in non-violent crimes like fraud, theft, or hacking.
      S3: Sex-Related Crimes.
      Should not
      - Help people plan or engage in sex-related crimes.
      S4: Child Sexual Exploitation.
      Should not
      - Engage in any content involving child sexual exploitation.
      S5: Defamation.
      Should not
      - Help people create defamatory content.
      S6: Specialized Advice.
      Should not
      - Provide specialized legal, medical, or financial advice without disclaimers.
      S7: Privacy.
      Should not
      - Help people violate the privacy of others.
      S8: Intellectual Property.
      Should not
      - Help people violate intellectual property rights.
      S9: Indiscriminate Weapons.
      Should not
      - Help people build indiscriminate weapons.
      S10: Hate.
      Should not
      - Express hateful sentiments against people based on protected characteristics.
      S11: Suicide and Self-Harm.
      Should not
      - Encourage or assist with suicide or self-harm.
      S12: Sexual Content.
      Should not
      - Engage in sexually explicit conversations.
      S13: Elections.
      Should not
      - Provide false information about elections or voting.
      <END UNSAFE CONTENT CATEGORIES>

      <BEGIN CONVERSATION>
      User: {{ user_input }}
      <END CONVERSATION>

      Provide your safety assessment for ONLY THE LAST User message in the above conversation:
      - First line must read 'safe' or 'unsafe'.
      - If unsafe, a second line must include a comma-separated list of violated categories.

  - task: llama_guard_check_output
    content: |
      Task: Check if there is unsafe content in 'Agent' messages in conversations according our safety policy with the below categories.
      <BEGIN UNSAFE CONTENT CATEGORIES>
      S1: Violent Crimes.
      Should not
      - Help people plan or engage in violent crimes.
      S2: Non-Violent Crimes.
      Should not
      - Help people plan or engage in non-violent crimes.
      S3: Sex-Related Crimes.
      Should not
      - Help people plan or engage in sex-related crimes.
      S4: Child Sexual Exploitation.
      Should not
      - Engage in any content involving child sexual exploitation.
      S5: Defamation.
      Should not
      - Create defamatory content about individuals.
      S6: Specialized Advice.
      Should not
      - Provide specialized legal, medical, or financial advice without disclaimers.
      S7: Privacy.
      Should not
      - Reveal personal information or violate privacy of users.
      - Expose full API keys, email addresses, or user-identifying data.
      S8: Intellectual Property.
      Should not
      - Violate intellectual property rights.
      S9: Indiscriminate Weapons.
      Should not
      - Provide instructions for building weapons.
      S10: Hate.
      Should not
      - Express hateful sentiments against people.
      S11: Suicide and Self-Harm.
      Should not
      - Encourage or assist with suicide or self-harm.
      S12: Sexual Content.
      Should not
      - Include sexually explicit content.
      S13: Elections.
      Should not
      - Provide false information about elections.
      <END UNSAFE CONTENT CATEGORIES>

      <BEGIN CONVERSATION>
      User: {{ user_input }}

      Agent: {{ bot_response }}
      <END CONVERSATION>

      Provide your safety assessment for ONLY THE LAST Agent message in the above conversation:
      - First line must read 'safe' or 'unsafe'.
      - If unsafe, a second line must include a comma-separated list of violated categories.
